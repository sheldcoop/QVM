  pad_pts: "Pad Pts."

GRID_MAPPING:
  UL_1: 11
  UL_2: 12
  UL_3: 13
  UL_4: 14
  LL_1: 21
  LL_2: 22
  LL_3: 23
  LL_4: 24
  LR_1: 31
  LR_2: 32
  LR_3: 33
  LR_4: 34
  UR_1: 41
  UR_2: 42
  UR_3: 43
  UR_4: 44

TOLERANCES:
  annular_ring_min: 0.0  # Breakout limit

PLOT_SETTINGS:
  vector_multiplier_min: 1
  vector_multiplier_max: 5000
  vector_multiplier_default: 2500

PANEL_VIEW:
  frame_width: 510.0
  frame_height: 515.0
  offset_x: 13.5
  offset_y: 15.0
  gap_x: 3.0
  gap_y: 3.0
  dynamic_gap_x: 5.0
  dynamic_gap_y: 3.5
  corner_radius: 20.0
  point_margin_factor: 0.20

COLORS:
  background: "#2C3E50"
  panel_body: "#C87533"
  quadrant_fill: "#F4B486"
  grid_border: "#8B4513"
  app_background: "#212121"
  app_text: "#FFFFFF"
  panel_ui: "#B87333"
  panel_ui_hover: "#d48c46"

FIGURE_SETTINGS:
  width: null
  height: null
  margin: 40
  point_marker_size: 35
  point_text_size: 14

CHART_COLORS:
  traffic_light_green: "#2ecc71"      # Healthy (>75 points)
  traffic_light_orange: "#f39c12"     # Warning (40-75 points)
  traffic_light_red: "#e74c3c"        # Critical (<40 points)
  traffic_light_gray: "#999999"       # Unknown/Missing
  chart_background: "#FFFFFF"         # Pure white
  chart_gridlines_visible: false

CHART_HEIGHTS:
  health_status: 550                  # Via/Pad health bar charts
  comparison_plot: 400                # Pad vs Via comparison
  analytics_plot: 600                 # Bullseye, Quiver, Heatmap

OPTICAL_EDGE_THRESHOLDS:
  green_min: 75                       # Healthy threshold
  orange_min: 40                      # Warning threshold (below is red)

CHART_MARKERS:
  pad_via_scatter_size: 16            # Size for Pad vs Via scatter plot dots
  pad_via_text_size: 10               # Size for Grid ID text on dots

PROCESS_STABILITY:
  via_nominal_diameter: 0.020         # Nominal Via diameter in mm (20 µm)
  via_ucl: 0.0215                     # Upper Control Limit for Vias (21.5 µm)
  via_lcl: 0.0185                     # Lower Control Limit for Vias (18.5 µm)
  via_y_min: 0.015                    # Via Y-axis min (15 µm)
  via_y_max: 0.035                    # Via Y-axis max (35 µm)
  
  pad_nominal_diameter: 0.3125        # Nominal Pad diameter in mm (312.5 µm)
  pad_ucl: 0.3157                     # Upper Control Limit for Pads (315.7 µm)
  pad_lcl: 0.3093                     # Lower Control Limit for Pads (309.3 µm)
  pad_y_min: 0.300                    # Pad Y-axis min (300 µm)
  pad_y_max: 0.325                    # Pad Y-axis max (325 µm)
  
  marker_size: 8                      # Scatter plot marker size
  nominal_color: "#1f77b4"            # Blue for nominal line
  nominal_width: 2                    # Nominal line width
  control_limit_color: "#ff7f0e"      # Orange for UCL/LCL lines
  control_limit_width: 2              # Control limit line width
  outlier_color: "#d62728"            # Red for out-of-spec points
  normal_color: "#2ca02c"             # Green for in-spec points
